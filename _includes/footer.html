<!-- Footer -->
<footer class="site-footer">
  <div class="container">
    <div class="footer-grid">
      <div class="footer-brand">
        <p class="footer-name">{{ site.author }}</p>
        <p class="footer-tagline">Operations · DevOps · Systems</p>
      </div>
      <nav class="footer-nav" aria-label="Footer">
        <a href="{{ '/blog/' | relative_url }}">Blog</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/contact/' | relative_url }}">Contact</a>
      </nav>
      <div class="footer-links">
        <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener" aria-label="GitHub">
          <i class="fa-brands fa-github"></i>
        </a>
        <a href="https://linkedin.com/in/{{ site.linkedin_username }}" target="_blank" rel="noopener" aria-label="LinkedIn">
          <i class="fa-brands fa-linkedin-in"></i>
        </a>
        <a href="https://twitter.com/{{ site.twitter_username }}" target="_blank" rel="noopener" aria-label="Twitter">
          <i class="fa-brands fa-x-twitter"></i>
        </a>
        <a href="mailto:{{ site.email }}" aria-label="Email">
          <i class="fa-regular fa-envelope"></i>
        </a>
        <a href="{{ '/feed.xml' | relative_url }}" aria-label="RSS Feed">
          <i class="fa-solid fa-rss"></i>
        </a>
      </div>
    </div>
    <p class="footer-text">
      &copy; {{ site.time | date: '%Y' }} {{ site.author }}. All rights reserved.
    </p>
  </div>
</footer>
