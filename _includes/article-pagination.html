<nav class="article-pagination">
  {% if page.previous %}
  <a href="{{ page.previous.url | relative_url }}" class="pag-prev">
    <span class="pag-direction">Previous</span>
    <span class="pag-title">{{ page.previous.title }}</span>
  </a>
  {% endif %}
  {% if page.next %}
  <a href="{{ page.next.url | relative_url }}" class="pag-next">
    <span class="pag-direction">Next</span>
    <span class="pag-title">{{ page.next.title }}</span>
  </a>
  {% endif %}
</nav>
