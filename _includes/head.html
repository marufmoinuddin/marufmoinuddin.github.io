<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="keywords" content="{{ site.keyword }}">
  <meta name="theme-color" content="#0a0a0b">
  <meta name="author" content="{{ site.author }}">

  {% seo %}

  <!-- Theme init — runs before paint to prevent FOUC -->
  <script>
    (function() {
      var theme = localStorage.getItem('theme');
      if (!theme) {
        theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      }
      document.documentElement.setAttribute('data-theme', theme);

      var penFavicon = theme === 'light'
        ? "{{ '/img/favicon-pen-light.svg' | relative_url }}"
        : "{{ '/img/favicon-pen-dark.svg' | relative_url }}";

      var existing = document.querySelector('link#siteFavicon');
      if (existing) {
        existing.href = penFavicon;
      } else {
        var link = document.createElement('link');
        link.id = 'siteFavicon';
        link.rel = 'icon';
        link.type = 'image/svg+xml';
        link.href = penFavicon;
        document.head.appendChild(link);
      }
    })();
  </script>

  <title>{% if page.title %}{{ page.title }} — {{ site.SEOTitle }}{% else %}{{ site.SEOTitle }}{% endif %}</title>

  <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">

  <!-- Favicon -->
  <link id="siteFavicon" rel="icon" type="image/svg+xml" href="{{ '/img/favicon-pen-dark.svg' | relative_url }}">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
