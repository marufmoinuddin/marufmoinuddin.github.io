title: Contact

<p class="page-lede">The best way to reach me is via email or LinkedIn. I try to respond within 24-48 hours.</p>

<div class="contact-grid">
  <div class="contact-card">
    <i class="fa-regular fa-envelope"></i>
    <h3>Email</h3>
    <p><a href="mailto:{{ site.email }}">{{ site.email }}</a></p>
  </div>
  <div class="contact-card">
    <i class="fa-brands fa-linkedin-in"></i>
    <h3>LinkedIn</h3>
    <p><a href="https://linkedin.com/in/{{ site.linkedin_username }}" target="_blank" rel="noopener">linkedin.com/in/{{ site.linkedin_username }}</a></p>
  </div>
  <div class="contact-card">
    <i class="fa-brands fa-github"></i>
    <h3>GitHub</h3>
    <p><a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">github.com/{{ site.github_username }}</a></p>
  </div>
  <div class="contact-card">
    <i class="fa-brands fa-x-twitter"></i>
    <h3>Twitter / X</h3>
    <p><a href="https://twitter.com/{{ site.twitter_username }}" target="_blank" rel="noopener">@{{ site.twitter_username }}</a></p>
  </div>
</div>
